<head>
  <meta charset="utf-8">

  <title>Védett oldal</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;color:#101713;background:#e9f7e9;font-family:Arial,sans-serif;overflow:hidden}
    body:before,body:after{content:"";position:fixed;border-radius:50%;pointer-events:none}body:before{width:560px;height:560px;right:-220px;bottom:-260px;border:95px solid rgba(80,169,92,.13)}
    body:after{width:330px;height:330px;left:-130px;top:-130px;background:rgba(255,255,255,.55)}
    main{position:relative;z-index:1;width:min(520px,100%);padding:42px;background:rgba(255,255,255,.93);border:1px solid rgba(16,23,19,.07);border-radius:24px;box-shadow:0 24px 70px rgba(25,70,35,.12)}
    .mark{display:flex;gap:3px;align-items:flex-end;width:34px;height:34px;margin-bottom:50px;padding:6px;background:#101713;border-radius:10px}.mark i{display:block;width:6px;background:#b7dfba;border-radius:4px}.mark i:nth-child(1){height:10px}.mark i:nth-child(2){height:20px}.mark i:nth-child(3){height:15px}
    .overline{display:flex;align-items:center;gap:10px;margin:0 0 22px;color:#276f33;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.7px}.overline:before{content:"";width:26px;height:1px;background:currentColor}
    h1{margin:0 0 18px;font-size:clamp(48px,8vw,70px);line-height:.95;letter-spacing:-5px}h1 em{color:#276f33;font-family:Georgia,serif;font-weight:400}
    .copy{margin:0 0 28px;color:#647069;font-size:14px;line-height:1.7}label{display:block;margin-bottom:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
    .row{display:grid;grid-template-columns:1fr auto;gap:9px}input,button{height:56px;border-radius:999px;font:inherit}input{min-width:0;padding:0 18px;color:#101713;background:#fff;border:1px solid #dce5de;outline:0}input:focus{border-color:#50a95c;box-shadow:0 0 0 4px rgba(80,169,92,.12)}
    button{padding:0 25px;color:#fff;background:#101713;border:0;font-weight:700;cursor:pointer}button:hover{background:#276f33}.error{min-height:18px;margin:10px 0 0;color:#a14c44;font-size:11px;font-weight:600}.note{margin:14px 0 0;color:#647069;font-size:10px}
    @media(max-width:560px){main{padding:28px 21px}.row{grid-template-columns:1fr}button{width:100%}.mark{margin-bottom:38px}}
  </style>
</head>
